name: Compile PS1 Bare-Metal App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build PS1 Executable
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install only the compiler and building tools (No Python/Pillow needed)
      - name: Install Toolchain and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu cmake ninja-build

      # 3. Configure the build system using CMake
      - name: Configure CMake
        run: |
          cmake --preset release \
            -DCMAKE_C_COMPILER=mipsel-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=mipsel-linux-gnu-g++

      # 4. Compile the C/ASM code into a PS1 executable
      - name: Build Executable
        run: |
          cmake --build build/release

      # 5. Gather the compiled files and upload them as a downloadable ZIP
      - name: Upload PS1 Executable (.psexe)
        uses: actions/upload-artifact@v4
        with:
          name: PS1-Compiled-Build
          path: build/release/**/*.psexe
