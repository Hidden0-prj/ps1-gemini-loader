name: Compile PS1 Bare-Metal App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build PS1 Executable
    runs-on: ubuntu-latest

    steps:
      # 1. Download YOUR repository
      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          path: my_code

      # 2. Download the official ps1-bare-metal SDK
      - name: Checkout ps1-bare-metal SDK
        uses: actions/checkout@v4
        with:
          repository: spicyjpeg/ps1-bare-metal
          path: sdk

      # 3. Install the MIPS toolchain AND Python venv tools
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu g++-mipsel-linux-gnu cmake ninja-build python3 python3-venv

      # 4. Inject your main.c into the SDK
      - name: Inject Your Code into the SDK
        run: |
          rm sdk/src/00_helloWorld/main.c
          cp my_code/main.c sdk/src/00_helloWorld/main.c

      # 5. Setup the Python Virtual Environment for the SDK
      - name: Setup SDK Python Environment
        run: |
          cd sdk
          # Create the virtual environment the SDK is looking for
          python3 -m venv env
          # Install the SDK's internal build tools
          env/bin/pip install -r requirements.txt

      # 6. Configure CMake
      - name: Configure CMake
        run: |
          cd sdk
          cmake --preset release \
            -DCMAKE_C_COMPILER=mipsel-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=mipsel-linux-gnu-g++

      # 7. Compile the code
      - name: Build Executable
        run: |
          cd sdk
          cmake --build build/release

      # 8. Upload the finished .psexe file
      - name: Upload PS1 Executable
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Loader-Build
          path: sdk/build/release/src/00_helloWorld/*.psexe
